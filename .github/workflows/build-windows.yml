name: Build Windows Package

# Triggers:
#   1. Push a version tag (e.g. v1.0.1) → builds and attaches zip to a GitHub Release
#   2. Click "Run workflow" on the Actions tab → builds a test zip (no release needed)

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version label for the zip (e.g. v1.0.1-test)"
        required: false
        default: "dev"

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write   # required to create GitHub Releases and upload assets

    steps:
      # ── 1. Get the code ────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Work out the version label ──────────────────────────────────────
      - name: Set version label
        shell: pwsh
        run: |
          if ($env:GITHUB_REF -match 'refs/tags/(.+)') {
            $ver = $Matches[1]
          } else {
            $ver = "${{ github.event.inputs.version }}"
            if (-not $ver) { $ver = "dev" }
          }
          echo "VERSION=$ver" >> $env:GITHUB_ENV
          echo "Building version: $ver"

      # ── 3. Download Python 3.11 embeddable (no install required) ──────────
      - name: Download Python 3.11 embeddable package
        shell: pwsh
        run: |
          $url = "https://www.python.org/ftp/python/3.11.9/python-3.11.9-embed-amd64.zip"
          Write-Host "Downloading Python 3.11 embeddable (no install needed)..."
          Invoke-WebRequest -Uri $url -OutFile "python-embed.zip" -UseBasicParsing
          New-Item -ItemType Directory -Path "bundle\python" | Out-Null
          Expand-Archive -Path "python-embed.zip" -DestinationPath "bundle\python"
          Write-Host "Python extracted."

      # ── 4. Enable pip inside the embedded Python ───────────────────────────
      #    By default the embeddable build blocks pip. We uncomment one line
      #    in the ._pth file and then bootstrap pip via get-pip.py.
      - name: Enable pip in embedded Python
        shell: pwsh
        run: |
          $pthFile = Get-ChildItem "bundle\python\python*._pth" | Select-Object -First 1
          Write-Host "Patching $($pthFile.Name) to enable site-packages..."
          $content = Get-Content $pthFile.FullName -Raw
          $content  = $content -replace '#import site', 'import site'
          Set-Content $pthFile.FullName $content

          Write-Host "Bootstrapping pip..."
          Invoke-WebRequest -Uri "https://bootstrap.pypa.io/get-pip.py" `
            -OutFile "get-pip.py" -UseBasicParsing
          & "bundle\python\python.exe" get-pip.py --no-warn-script-location --quiet
          Write-Host "pip ready."

      # ── 5. Install app dependencies ────────────────────────────────────────
      - name: Install Python dependencies
        shell: pwsh
        run: |
          Write-Host "Installing dependencies (may take a few minutes)..."
          & "bundle\python\python.exe" -m pip install `
              streamlit pandas numpy plotly pyyaml jinja2 `
              --no-warn-script-location --quiet
          Write-Host "All dependencies installed."

      # ── 6a. Stamp version.txt with the current build version ─────────────
      - name: Stamp version.txt
        shell: pwsh
        run: |
          $ver = $env:VERSION.TrimStart('v')
          Set-Content "version.txt" $ver -Encoding UTF8 -NoNewline
          Write-Host "version.txt set to: $ver"

      # ── 6. Copy application files into the bundle ─────────────────────────
      - name: Copy application files
        shell: pwsh
        run: |
          $items = @('app.py', 'config', 'core', 'ui', 'reports', 'data', '.streamlit', 'version.txt')
          foreach ($item in $items) {
            if (Test-Path $item -PathType Container) {
              Copy-Item -Recurse -Path $item -Destination "bundle\$item"
            } elseif (Test-Path $item -PathType Leaf) {
              Copy-Item -Path $item -Destination "bundle\$item"
            }
          }
          Write-Host "Application files copied."

      # ── 7. Create the double-click launcher ───────────────────────────────
      - name: Create launcher
        shell: pwsh
        run: |
          $bat = @'
          @echo off
          title Squad Flow Metrics
          cls
          echo.
          echo  =======================================================
          echo   Squad Flow Metrics  ^|  Loading, please wait...
          echo  =======================================================
          echo.

          REM ── Silently remove Windows "downloaded from internet" zone tags ──
          REM    This prevents Defender warnings on subsequent runs.
          REM    Runs quietly — no UAC, no prompt, no visible output.
          powershell -NoProfile -NonInteractive -WindowStyle Hidden -Command ^
            "Get-ChildItem -Path '%~dp0' -Recurse -ErrorAction SilentlyContinue | Unblock-File -ErrorAction SilentlyContinue" >nul 2>&1

          echo   When you see "You can now view your Streamlit app"
          echo   open your browser and go to:
          echo.
          echo       http://localhost:8501
          echo.
          echo   - To STOP the app, close this window.
          echo   - First launch may take 60-90 seconds - please wait.
          echo.
          echo  =======================================================
          echo.

          cd /d "%~dp0"

          REM Launch the app using the bundled Python (no system Python needed)
          REM Browser is NOT opened automatically to avoid Windows security prompts.
          "%~dp0python\python.exe" -m streamlit run "%~dp0app.py" ^
            --server.headless=true ^
            --server.port=8501 ^
            --browser.gatherUsageStats=false ^
            --server.enableCORS=true ^
            --server.enableXsrfProtection=false

          echo.
          echo   The app has stopped. You can close this window.
          pause
          '@
          Set-Content "bundle\Run Squad Flow Metrics.bat" $bat -Encoding ASCII
          Write-Host "Launcher created."

      # ── 8. Create plain-English instructions ──────────────────────────────
      - name: Create START HERE instructions
        shell: pwsh
        run: |
          $txt = @'
          ================================================================
          SQUAD FLOW METRICS  —  Quick Start Guide
          ================================================================

          *** IMPORTANT — DO THIS BEFORE ANYTHING ELSE ***
          -------------------------------------------------
          Windows marks downloaded files as "untrusted" which causes
          security warnings. Remove those marks NOW before extracting:

            1. RIGHT-CLICK the zip file you downloaded
            2. Click "Properties"
            3. At the bottom, tick the "Unblock" checkbox
            4. Click OK
            5. NOW extract the zip as normal

          If you have already extracted without doing this, see the
          "SOMETHING NOT WORKING?" section below.


          UPGRADING FROM A PREVIOUS VERSION?
          ------------------------------------
          Close the black command window BEFORE running the installer.
          If the app is still running, the installer cannot overwrite the
          files and the upgrade will be incomplete.


          STARTING THE APP
          ----------------
          1. Open the extracted "Squad-Flow-Metrics" folder.

          2. Double-click:  "Run Squad Flow Metrics.bat"

          3. If Windows SmartScreen appears:
               - Click "More info"
               - Click "Run anyway"
             (This only happens the very first time.)

          4. A black window will appear — this is normal. It is the engine
             running in the background. Do not close it while using the app.

          5. If your firewall asks for permission, click "Allow".

          6. Wait until you see this message in the black window:
                "You can now view your Streamlit app in your browser"
             This may take 60-90 seconds on first launch — please be patient.

          7. Open your browser (Edge or Chrome) and go to:
                http://localhost:8501

          When you are finished, close the black window to stop the app.

          NOTE: The browser does NOT open automatically — this is intentional
          to avoid Windows security prompts. Just go to localhost:8501 manually.


          YOUR DATA STAYS ON YOUR COMPUTER
          ---------------------------------
          Nothing is sent anywhere. All analysis runs locally.
          You can use this tool on an air-gapped machine with no internet.


          LOADING YOUR JIRA DATA
          -----------------------
          Option A — Use the built-in sample data
            Click "Load sample data" in the left-hand sidebar.
            Explore all features immediately with no Jira export needed.

          Option B — Load your own Jira export (one or more squads)
            1. In Jira: Issues > Search for issues >
                        Export > Export to CSV (all fields)
               Use a filter like:
                 project = XX AND component = "Squad Name"
                 AND issuetype in (Story, Bug, Task)
                 AND created >= startOfMonth(-6)
               (Do NOT filter by status=Done — that hides in-flight work)
            2. In the app: upload the file(s) via the sidebar uploader.
               You can upload one CSV per squad — they are merged automatically.

          Option C — Also upload an Advanced Roadmaps export
            Unlocks the Plan Accuracy and Sprint Slippage tabs.


          SOMETHING NOT WORKING?
          ----------------------
          - "Windows protected your PC" / SmartScreen warning:
              Click "More info" then "Run anyway". Safe to proceed.

          - Still getting security warnings after clicking Run anyway?
              You need to unblock the files. Open PowerShell and run:
                Get-ChildItem -Path "C:\path\to\Squad-Flow-Metrics" -Recurse | Unblock-File
              (Replace the path with where you extracted the folder.)

          - If the app does not start, check nothing else is using
            port 8501 (e.g. another copy of the app already running).

          - Try closing the black window and re-opening the .bat file.


          ================================================================
          '@
          Set-Content "bundle\START HERE.txt" $txt -Encoding UTF8
          Write-Host "Instructions created."

      # ── 9. Zip everything up ──────────────────────────────────────────────
      #    Bundle is wrapped in a fixed "Squad-Flow-Metrics" subfolder so
      #    the extracted folder name never changes between versions.
      - name: Create zip archive
        shell: pwsh
        run: |
          $zipName = "Squad-Flow-Metrics-$env:VERSION-Windows.zip"
          Write-Host "Creating $zipName ..."
          New-Item -ItemType Directory -Path "zip-root\Squad-Flow-Metrics" | Out-Null
          Copy-Item -Recurse -Path "bundle\*" -Destination "zip-root\Squad-Flow-Metrics"
          Compress-Archive -Path "zip-root\*" -DestinationPath $zipName -CompressionLevel Optimal
          $sizeMB = [math]::Round((Get-Item $zipName).Length / 1MB, 1)
          Write-Host "Done: $zipName  ($sizeMB MB)"
          echo "ZIP_NAME=$zipName" >> $env:GITHUB_ENV

      # ── 10. Install Inno Setup ─────────────────────────────────────────────
      - name: Install Inno Setup
        shell: pwsh
        run: |
          choco install innosetup --no-progress -y
          Write-Host "Inno Setup installed."

      # ── 11. Build Windows installer (.exe) ────────────────────────────────
      #    Installs to %LOCALAPPDATA%\SquadFlowMetrics — no admin / UAC needed.
      #    Installed files have no "downloaded from internet" zone tag, so
      #    Windows Defender / SmartScreen will not fire on daily use.
      - name: Create Inno Setup script
        shell: pwsh
        run: |
          $ver  = $env:VERSION.TrimStart('v')
          $iss = @"
          [Setup]
          AppName=Squad Flow Metrics
          AppVersion=$ver
          AppPublisher=Squad Flow Metrics
          AppPublisherURL=https://github.com/markcocoscopas/squad-flow-metrics
          AppSupportURL=https://github.com/markcocoscopas/squad-flow-metrics/issues
          AppUpdatesURL=https://github.com/markcocoscopas/squad-flow-metrics/releases
          DefaultDirName={localappdata}\SquadFlowMetrics
          DefaultGroupName=Squad Flow Metrics
          AllowNoIcons=yes
          OutputDir=.
          OutputBaseFilename=Squad-Flow-Metrics-$($env:VERSION)-Setup
          Compression=lzma2/ultra64
          SolidCompression=yes
          PrivilegesRequired=lowest
          PrivilegesRequiredOverridesAllowed=commandline
          DisableProgramGroupPage=yes
          DisableReadyMemo=yes
          DisableWelcomePage=no
          WizardStyle=modern
          UninstallDisplayName=Squad Flow Metrics

          [Languages]
          Name: "english"; MessagesFile: "compiler:Default.isl"

          [Tasks]
          Name: "desktopicon"; Description: "Create a &desktop shortcut"; GroupDescription: "Additional icons:"; Flags: unchecked

          [Files]
          Source: "bundle\*"; DestDir: "{app}"; Flags: ignoreversion recursesubdirs createallsubdirs

          [Icons]
          Name: "{group}\Squad Flow Metrics";           Filename: "{app}\Run Squad Flow Metrics.bat"; WorkingDir: "{app}"
          Name: "{group}\Uninstall Squad Flow Metrics"; Filename: "{uninstallexe}"
          Name: "{userdesktop}\Squad Flow Metrics";     Filename: "{app}\Run Squad Flow Metrics.bat"; WorkingDir: "{app}"; Tasks: desktopicon

          [Run]
          Filename: "{app}\Run Squad Flow Metrics.bat"; Description: "Launch Squad Flow Metrics now"; Flags: nowait postinstall skipifsilent shellexec
          "@
          Set-Content "setup.iss" $iss -Encoding UTF8
          Write-Host "Inno Setup script written."

      - name: Compile installer
        shell: pwsh
        run: |
          $iscc    = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
          Write-Host "Compiling installer..."
          & $iscc "setup.iss"
          if ($LASTEXITCODE -ne 0) { throw "ISCC failed with exit code $LASTEXITCODE" }
          $setupName = "Squad-Flow-Metrics-$env:VERSION-Setup.exe"
          $sizeMB    = [math]::Round((Get-Item $setupName).Length / 1MB, 1)
          Write-Host "Installer ready: $setupName  ($sizeMB MB)"
          echo "SETUP_NAME=$setupName" >> $env:GITHUB_ENV

      # ── 12. Upload both artefacts (always) ────────────────────────────────
      - name: Upload installer as workflow artefact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.SETUP_NAME }}
          path: ${{ env.SETUP_NAME }}
          retention-days: 30

      - name: Upload zip as workflow artefact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ZIP_NAME }}
          path: ${{ env.ZIP_NAME }}
          retention-days: 30

      # ── 13. Attach both to the GitHub Release (tag builds only) ───────────
      - name: Attach files to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ env.SETUP_NAME }}
            ${{ env.ZIP_NAME }}
          generate_release_notes: true
          body: |
            ## Squad Flow Metrics ${{ env.VERSION }} — Windows

            ### ✅ Recommended: Installer (easiest, no Defender hassle)

            **Upgrading from a previous version? Close the app first.**
            Close the black command window before running the installer,
            otherwise the files will be locked and the installer cannot overwrite them.

            1. Download **${{ env.SETUP_NAME }}** below
            2. If SmartScreen appears, click **More info → Run anyway** (installer is unsigned but safe — this happens once only)
            3. Click through the short installer wizard (no admin rights needed)
            4. Launch from the **Start Menu** or **Desktop shortcut**
            5. Open your browser at **http://localhost:8501**

            After installation, Windows Defender will never prompt again — the app runs from your user profile without any internet zone tags.

            ---

            ### Alternative: Portable zip (advanced users)
            1. Download **${{ env.ZIP_NAME }}**
            2. **Right-click the zip → Properties → tick Unblock → OK** before extracting
            3. Extract to any folder and double-click **"Run Squad Flow Metrics.bat"**

            ---
            *Requires Windows 10 or later (64-bit). No Python installation needed.*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
